<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Signal Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #131722;
      color: #D1D4DC;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Top control bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: #1E222D;
      border-bottom: 1px solid #2A2E39;
      flex-shrink: 0;
    }

    #symbol-input {
      background: #131722;
      color: #D1D4DC;
      border: 1px solid #2A2E39;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      width: 110px;
      outline: none;
      letter-spacing: 0.5px;
    }
    #symbol-input:focus { border-color: #2196F3; }

    .sep { width: 1px; height: 18px; background: #2A2E39; margin: 0 2px; }

    .iv-btn {
      background: transparent;
      color: #787B86;
      border: 1px solid #2A2E39;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .iv-btn:hover  { background: #2A2E39; color: #D1D4DC; }
    .iv-btn.active { background: #2196F3; color: #fff; border-color: #2196F3; }

    #status-wrap { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    #status-dot  { width: 7px; height: 7px; border-radius: 50%; background: #EF5350; }
    #status-dot.ok { background: #26A69A; }
    #status-text   { font-size: 10px; color: #787B86; }

    /* ── Main body ── */
    #body { flex: 1; display: flex; min-height: 0; }

    /* ── Sidebar ── */
    #sidebar {
      width: 240px;
      min-width: 240px;
      background: #1E222D;
      border-right: 1px solid #2A2E39;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .sidebar-title {
      padding: 9px 12px;
      border-bottom: 1px solid #2A2E39;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #4C525E;
      flex-shrink: 0;
    }

    /* Signal list */
    #signal-list { flex: 1; overflow-y: auto; padding: 8px; min-height: 0; }
    #signal-list::-webkit-scrollbar       { width: 3px; }
    #signal-list::-webkit-scrollbar-thumb { background: #2A2E39; border-radius: 2px; }

    .signal-card {
      padding: 9px 11px;
      border-radius: 5px;
      margin-bottom: 5px;
      border-left: 3px solid;
    }
    .signal-card.BUY  { background: rgba(38,166,154,0.07); border-color: #26A69A; }
    .signal-card.SELL { background: rgba(239,83,80,0.07);  border-color: #EF5350; }

    .sc-row { display: flex; justify-content: space-between; align-items: center; }
    .sc-dir  { font-size: 11px; font-weight: 700; letter-spacing: 1px; }
    .BUY  .sc-dir { color: #26A69A; }
    .SELL .sc-dir { color: #EF5350; }
    .sc-conf-HIGH   { font-size: 10px; font-weight: 600; color: #26A69A; }
    .sc-conf-MEDIUM { font-size: 10px; font-weight: 600; color: #FF9800; }
    .sc-conf-LOW    { font-size: 10px; font-weight: 600; color: #787B86; }
    .sc-price  { font-size: 15px; font-weight: 600; margin: 2px 0 1px; }
    .sc-time   { font-size: 10px; color: #787B86; }
    .sc-reason { font-size: 10px; color: #B2B5BE; margin-top: 3px; line-height: 1.5; }
    .sc-trend  { font-size: 9px;  color: #4C525E; margin-top: 2px; }
    .no-sig    { font-size: 11px; color: #4C525E; text-align: center; margin-top: 24px; }

    /* ── Triggers panel ── */
    #triggers-panel {
      border-top: 1px solid #2A2E39;
      flex-shrink: 0;
    }
    #triggers-list { padding: 4px 8px 6px; max-height: 160px; overflow-y: auto; }
    #triggers-list::-webkit-scrollbar       { width: 3px; }
    #triggers-list::-webkit-scrollbar-thumb { background: #2A2E39; border-radius: 2px; }

    .trig-row {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 2px; border-bottom: 1px solid #1A1D27; font-size: 10px;
    }
    .trig-row:last-child { border-bottom: none; }
    .trig-sym  { color: #D1D4DC; font-weight: 600; min-width: 60px; }
    .trig-iv   { color: #787B86; min-width: 28px; }
    .trig-conf { font-size: 9px; font-weight: 600; border-radius: 3px; padding: 1px 4px; }
    .trig-conf-HIGH   { background: rgba(38,166,154,0.2);  color: #26A69A; }
    .trig-conf-MEDIUM { background: rgba(255,152,0,0.2);   color: #FF9800; }
    .trig-conf-LOW    { background: rgba(120,123,134,0.2); color: #787B86; }
    .trig-edit   { cursor: pointer; font-size: 11px; opacity: 0.5; margin-left: auto; }
    .trig-edit:hover { opacity: 1; color: #2196F3; }
    .trig-toggle { cursor: pointer; font-size: 12px; opacity: 0.6; margin-left: 4px; }
    .trig-toggle:hover { opacity: 1; }
    .trig-del    { cursor: pointer; color: #EF5350; font-size: 12px; opacity: 0.5; margin-left: 4px; }
    .trig-del:hover { opacity: 1; }
    .trig-row.inactive { opacity: 0.45; }
    .trig-empty { font-size: 11px; color: #4C525E; text-align: center; padding: 8px 0; }

    #trig-add-form {
      display: none; padding: 6px 8px 8px;
      border-top: 1px solid #2A2E39; background: #131722;
    }
    #trig-add-form.open { display: block; }
    .trig-form-row { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; margin-bottom: 5px; }
    .trig-inp, .trig-sel {
      background: #1E222D; color: #D1D4DC; border: 1px solid #2A2E39;
      border-radius: 3px; padding: 3px 6px; font-size: 10px; outline: none;
    }
    .trig-inp { width: 72px; }
    .trig-sel { flex: 1; }
    .trig-inp:focus, .trig-sel:focus { border-color: #2196F3; }
    .trig-save-btn {
      background: #2196F3; color: #fff; border: none; border-radius: 3px;
      padding: 3px 8px; font-size: 10px; cursor: pointer; width: 100%;
    }
    .trig-save-btn:hover { background: #1976D2; }

    /* Signal card highlight when trigger matched */
    .signal-card.trigger-match {
      box-shadow: 0 0 0 1px currentColor;
      animation: trigpulse 1.5s ease-in-out 2;
    }
    @keyframes trigpulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }

    /* ── Portfolio panel ── */
    #portfolio-panel {
      border-top: 1px solid #2A2E39;
      flex-shrink: 0;
    }

    #portfolio-list {
      padding: 6px 8px 4px;
      max-height: 160px;
      overflow-y: auto;
    }
    #portfolio-list::-webkit-scrollbar       { width: 3px; }
    #portfolio-list::-webkit-scrollbar-thumb { background: #2A2E39; border-radius: 2px; }

    .pf-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      padding: 3px 3px;
      border-bottom: 1px solid #1A1D27;
      font-size: 11px;
    }
    .pf-row:last-child { border-bottom: none; }
    .pf-currency { color: #B2B5BE; font-weight: 600; min-width: 52px; }
    .pf-amount   { color: #D1D4DC; flex: 1; text-align: right; }
    .pf-locked   { color: #4C525E; font-size: 9px; }
    .pf-empty    { font-size: 11px; color: #4C525E; text-align: center; padding: 8px 0; }
    #pf-updated  { font-size: 9px; color: #4C525E; text-align: right; padding: 2px 11px 5px; }

    /* ── Charts ── */
    #charts { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }

    .chart-wrapper {
      position: relative;
      overflow: hidden;
      min-height: 60px;
    }

    /* Initial proportions — overridden by JS drag */
    #wrap-main { flex: 6; }
    #wrap-macd { flex: 2; }
    #wrap-rsi  { flex: 2; }

    .chart-container { width: 100%; height: 100%; }

    .chart-label {
      position: absolute;
      top: 6px; left: 10px;
      z-index: 10;
      font-size: 10px;
      color: #4C525E;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ── Resize handles ── */
    .resize-handle {
      height: 5px;
      flex-shrink: 0;
      background: #1A1D27;
      border-top: 1px solid #2A2E39;
      border-bottom: 1px solid #2A2E39;
      cursor: row-resize;
      position: relative;
      z-index: 20;
      transition: background 0.15s;
    }
    .resize-handle:hover,
    .resize-handle.dragging { background: #2196F3; }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <input id="symbol-input" type="text" value="BTCUSDT" title="Press Enter to apply" spellcheck="false" />
  <div class="sep"></div>
  <button class="iv-btn" data-iv="1s">1s</button>
  <button class="iv-btn active" data-iv="1m">1m</button>
  <button class="iv-btn" data-iv="3m">3m</button>
  <button class="iv-btn" data-iv="5m">5m</button>
  <button class="iv-btn" data-iv="15m">15m</button>
  <button class="iv-btn" data-iv="30m">30m</button>
  <button class="iv-btn" data-iv="1h">1h</button>
  <button class="iv-btn" data-iv="4h">4h</button>
  <div id="status-wrap">
    <div id="status-dot"></div>
    <span id="status-text">Connecting…</span>
  </div>
</div>

<!-- Body -->
<div id="body">

  <!-- Sidebar: signals + portfolio -->
  <div id="sidebar">
    <div class="sidebar-title">Signals</div>
    <div id="signal-list">
      <div class="no-sig">Waiting for signals…</div>
    </div>

    <!-- Portfolio panel -->
    <div id="portfolio-panel">
      <div class="sidebar-title">Portfolio (CoinDCX)</div>
      <div id="portfolio-list">
        <div class="pf-empty">Loading…</div>
      </div>
      <div id="pf-updated"></div>
    </div>

    <!-- Triggers panel -->
    <div id="triggers-panel">
      <div class="sidebar-title" style="display:flex;align-items:center;justify-content:space-between;cursor:default">
        <span>Triggers</span>
        <span id="trig-add-btn" style="cursor:pointer;color:#2196F3;font-size:14px;line-height:1" title="Add trigger">+</span>
      </div>
      <div id="trig-add-form">
        <div class="trig-form-row">
          <input  id="trig-sym"  class="trig-inp" type="text"   placeholder="BTCUSDT" />
          <select id="trig-iv"   class="trig-sel">
            <option>1s</option><option selected>1m</option><option>3m</option>
            <option>5m</option><option>15m</option><option>30m</option>
            <option>1h</option><option>4h</option>
          </select>
          <select id="trig-conf" class="trig-sel">
            <option value="LOW">LOW</option>
            <option value="MEDIUM" selected>MEDIUM</option>
            <option value="HIGH">HIGH</option>
          </select>
        </div>
        <button class="trig-save-btn" id="trig-save-btn">Save Trigger</button>
      </div>
      <div id="triggers-list"><div class="trig-empty">No triggers</div></div>
    </div>
  </div>

  <!-- Charts -->
  <div id="charts">
    <div class="chart-wrapper" id="wrap-main">
      <div class="chart-label" id="label-main">Loading…</div>
      <div id="chart-main" class="chart-container"></div>
    </div>
    <div class="resize-handle" id="rh-1" title="Drag to resize"></div>
    <div class="chart-wrapper" id="wrap-macd">
      <div class="chart-label">
        MACD (12,26,9)&nbsp;·&nbsp;
        MACD <span style="color:#2196F3">─</span>&nbsp;
        Signal <span style="color:#FF9800">─</span>
      </div>
      <div id="chart-macd" class="chart-container"></div>
    </div>
    <div class="resize-handle" id="rh-2" title="Drag to resize"></div>
    <div class="chart-wrapper" id="wrap-rsi">
      <div class="chart-label">
        RSI (14) <span style="color:#CE93D8">─</span>&nbsp;·&nbsp;
        ADX (14) <span style="color:#FF9800">─</span>
      </div>
      <div id="chart-rsi" class="chart-container"></div>
    </div>
  </div>

</div>

<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
